# ============================================================
#  Trio Mix-Assistant — show configuration
#  Edit the values, save, then run start.  Lines starting with # are ignored.
# ============================================================

# Mode:  hardware  = drive the real M32C
#        emulate   = full app against a built-in fake console (no gear, rehearse)
#        sim       = pure simulation
MODE=hardware

# Your M32C console's IP address (hardware mode).
CONSOLE_IP=192.168.1.50

# Auto-detect the input device + size the channel map + set input gain? (yes/no)
#   Easiest option — overrides AUDIO_DEVICE/INPUT_GAIN below.
AUTO=no

# Audio input device for the "listening half".
#   Run  list-devices  to see the options, then put the NUMBER or exact NAME here.
#   Leave blank to run manual mixing + scene recall only (assistant idle).
AUDIO_DEVICE=

# Output device the calibration pink noise plays to — point at the PA.
#   Leave blank for the OS default output (often the laptop speakers!).
OUTPUT_DEVICE=

# Digital input boost in dB for a quiet mic/interface (e.g. a dynamic Samson Q9U).
#   Leave blank for none; try 20-40 if calibration reports the mic is too quiet.
INPUT_GAIN=

# Optional show template (per-song scenes + reference levels).
#   A .json filename in this folder, or blank for the built-in trio set.
TEMPLATE=

# Venue name — tags the session log (sessions.db) for that room's history.
VENUE=

# Serve to tablets over the LAN? (yes/no)
LAN=yes

# Use HTTPS so tablets get a real PWA + screen wake-lock? (yes/no)
HTTPS=yes

# Dashboard port.
PORT=8770

# Optional: AbleSet automatic scene recall — the UDP port AbleSet sends to.
ABLESET_PORT=

# Optional: AI advisory layer (suggestions only, never controls the mix).
#   yes requires an ANTHROPIC_API_KEY environment variable.
ADVISOR=no
